document.querySelectorAll(".dk-inp").forEach(function(inp){inp.onfocus=function(e){e.target.select();};inp.oninput=function(e){var id=e.target.dataset.id;var tip=e.target.dataset.tip;var val=e.target.value;if(!S.depoKalan[S.teslim])S.depoKalan[S.teslim]={};if(val===""||parseFloat(val)===0){delete S.depoKalan[S.teslim][id+"_"+tip];}else{S.depoKalan[S.teslim][id+"_"+tip]=parseFloat(val);}if(tip==="koli"){var tu=Object.values(URUNLER).flat();var urun=tu.find(function(u){return u.id===id;});if(urun&&urun.kg>0&&val){var kgVal=Math.round(parseFloat(val)*urun.kg*100)/100;S.depoKalan[S.teslim][id+"_kg"]=kgVal;var kgInp=document.querySelector('.dk-inp[data-id="'+id+'"][data-tip="kg"]');if(kgInp)kgInp.value=kgVal;}}};});
document.querySelectorAll(".fg-inp").forEach(function(inp){inp.onfocus=function(e){e.target.select();};inp.oninput=function(e){var id=e.target.dataset.id;var val=e.target.value;if(!S.fabrikaGelen[S.teslim])S.fabrikaGelen[S.teslim]={};if(val===""||parseFloat(val)===0)delete S.fabrikaGelen[S.teslim][id];else S.fabrikaGelen[S.teslim][id]=parseFloat(val);};});
document.querySelectorAll(".dag-inp").forEach(function(inp){inp.onfocus=function(e){e.target.select();};inp.oninput=function(e){var pl=e.target.dataset.pl;var val=e.target.value;var tk=S.teslim;var uid=S.dagitimUrun;if(!S.dagitim[tk])S.dagitim[tk]={};if(!S.dagitim[tk][uid])S.dagitim[tk][uid]={};if(val===""||parseFloat(val)===0)delete S.dagitim[tk][uid][pl];else S.dagitim[tk][uid][pl]=parseFloat(val);};});
on("txtNot","input",function(e){S.notlar=e.target.value;});
on("btnGo","click",gonder);
on("btnSM","click",function(){S.musteri="";S.miktarlar={};S.notlar="";S.aktifKat=null;S.durum="";S.duzenleId=null;S.sayfa="musteri";render();});
on("btnCG","click",cikis);
}

function girisYap(){var sifreEl=document.getElementById("txtSifre");var hataMsj=document.getElementById("hataMsj");if(!S.plasiyer||!sifreEl)return;var sifre=sifreEl.value;if(sifre.toLowerCase()!==KULLANICILAR[S.plasiyer]){if(hataMsj){hataMsj.textContent="Şifre yanlış!";hataMsj.style.display="block";}return;}try{localStorage.setItem("baktav_user",S.plasiyer);}catch(e){}S.sayfa="musteri";render();}
function cikis(){S.plasiyer="";S.musteri="";S.miktarlar={};S.notlar="";S.aktifKat=null;S.durum="";S.duzenleId=null;S.sayfa="giris";try{localStorage.removeItem("baktav_user");}catch(e){}render();}

function gonder(){var gm=Object.entries(S.miktarlar).filter(function(e){return e[1]&&e[1].m>0;});if(gm.length===0)return;var tu=Object.values(URUNLER).flat();var su=gm.map(function(e){var id=e[0],d=e[1];var u=tu.find(function(x){return x.id===id;});return{id:id,ad:u?u.ad:id,mk:d.m,br:d.b,gr:d.g||"",kg:u?u.kg:0,tip:u?u.tip:"f"};});
var sipId=S.duzenleId||(Date.now()+"-"+Math.random().toString(36).substr(2,5));
var isEk=S.sipDurum==="kapali"&&S.plasiyer!=="YÖNETİM";
var sip={id:sipId,pl:S.plasiyer,mu:S.musteri,td:S.teslim,ur:su,nt:S.notlar,gz:new Date().toISOString(),ek:isEk};
// Firebase'e yaz
db.ref("siparisler/"+sipId).set(sip).then(function(){
  if(isEk)S.durum="ek";
  else if(S.duzenleId)S.durum="duzenlendi";
  else S.durum="ok";
  S.duzenleId=null;S.sayfa="ok";render();
}).catch(function(){S.durum="err";S.duzenleId=null;S.sayfa="ok";render();});
}

async function excelIndir(){var tum=tumBugunSip();var wb=new ExcelJS.Workbook();var borderThin={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};var headerFillGreen={type:'pattern',pattern:'solid',fgColor:{argb:'FFD9EAD3'}};var headerFillBlue={type:'pattern',pattern:'solid',fgColor:{argb:'FFCFE2F3'}};var headerFont={bold:true,size:11};var dataFont={size:11};var toplamFill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF0F5F1'}};
var ws1=wb.addWorksheet("Siparişler");var h1=ws1.addRow(["Plasiyer","Müşteri","Ürün","Miktar","Birim","Gramaj","Tip"]);h1.eachCell(function(c){c.font=headerFont;c.fill=headerFillGreen;c.border=borderThin;});tum.forEach(function(s){s.ur.forEach(function(u){var r=ws1.addRow([s.pl,s.mu,u.ad,u.mk,u.br,u.gr||"",u.tip==="k"?"Kasap":"Fabrika"]);r.eachCell(function(c){c.border=borderThin;});});});ws1.columns=[{width:14},{width:20},{width:32},{width:10},{width:8},{width:14},{width:10}];
var ws2=wb.addWorksheet(S.teslim);var fabUrunler=[];Object.keys(URUNLER).forEach(function(kat){if(kat==="Gramajlı Siparişler"||kat==="Parçalama")return;URUNLER[kat].forEach(function(u){if(u.tip!=="k")fabUrunler.push(u);});});var gelenSip={};tum.filter(function(s){return !s.ek;}).forEach(function(s){s.ur.forEach(function(u){if(u.tip==="k")return;if(!gelenSip[u.ad])gelenSip[u.ad]=0;gelenSip[u.ad]+=u.mk;});});var dk=S.depoKalan[S.teslim]||{};
ws2.addRow([S.teslim]);var r2=ws2.addRow(["Ürün Adı","Depo Devir","Onaylanmış","Gelen sipariş","Toplam","Ek Sipariş","Fazla","BAKPİ GELEN","","","","Ürün Adı","Sipariş","Ek sipariş","","Toplam"]);for(var ci=1;ci<=8;ci++){r2.getCell(ci).font=headerFont;r2.getCell(ci).fill=headerFillGreen;r2.getCell(ci).border=borderThin;}for(var ci=12;ci<=16;ci++){r2.getCell(ci).font=headerFont;r2.getCell(ci).fill=headerFillBlue;r2.getCell(ci).border=borderThin;}
for(var i=0;i<fabUrunler.length;i++){var u=fabUrunler[i];var depoDevir=dk[u.id+"_koli"]||0;var gelen=gelenSip[u.ad]||0;var rn=i+3;var r=ws2.addRow([u.ad,depoDevir>0?depoDevir:null,null,gelen>0?gelen:null]);r.getCell(5).value={formula:"B"+rn+"+C"+rn+"-D"+rn};r.getCell(6).value=null;r.getCell(7).value={formula:"E"+rn+"+F"+rn};r.getCell(8).value={formula:"C"+rn+"+F"+rn};r.getCell(12).value=u.ad;r.getCell(13).value={formula:"C"+rn};r.getCell(14).value={formula:"F"+rn};r.getCell(16).value={formula:"M"+rn+"+N"+rn};for(var ci=1;ci<=8;ci++){r.getCell(ci).border=borderThin;}for(var ci=12;ci<=16;ci++){r.getCell(ci).border=borderThin;}}
var lastRow=fabUrunler.length+2;var tr=ws2.addRow(["TOPLAM"]);for(var ci=2;ci<=8;ci++){tr.getCell(ci).value={formula:"SUM("+String.fromCharCode(64+ci)+"3:"+String.fromCharCode(64+ci)+lastRow+")"};}tr.getCell(12).value="TOPLAM";tr.getCell(13).value={formula:"SUM(M3:M"+lastRow+")"};tr.getCell(14).value={formula:"SUM(N3:N"+lastRow+")"};tr.getCell(16).value={formula:"SUM(P3:P"+lastRow+")"};for(var ci=1;ci<=8;ci++){tr.getCell(ci).font={bold:true};tr.getCell(ci).fill=toplamFill;tr.getCell(ci).border=borderThin;}for(var ci=12;ci<=16;ci++){tr.getCell(ci).font={bold:true};tr.getCell(ci).fill=toplamFill;tr.getCell(ci).border=borderThin;}
ws2.columns=[{width:30},{width:11},{width:12},{width:14},{width:9},{width:11},{width:9},{width:13},{width:3},{width:3},{width:3},{width:30},{width:9},{width:11},{width:3},{width:9}];
var buffer=await wb.xlsx.writeBuffer();var blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="baktav_siparis_"+S.teslim+".xlsx";document.body.appendChild(a);a.click();document.body.removeChild(a);}

function on(id,ev,fn){var e=document.getElementById(id);if(e)e.addEventListener(ev,fn);}
function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):""}
initFirebase();
</script>
